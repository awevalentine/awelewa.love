<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Promise to Awelewa</title>
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/d4af37/like.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold: #d4af37;
            --royal-black: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--royal-black);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center; justify-content: center;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #630d0d 0%, #1a1a1a 100%);
            z-index: -1;
        }

        .main-card {
            text-align: center;
            padding: 60px 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            max-width: 500px;
            width: 85%;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            animation: slideUp 1.5s ease-out;
        }

        h1 { font-family: 'Great Vibes', cursive; font-size: 4rem; color: var(--gold); margin: 0; }
        .subtitle { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 4px; font-size: 0.8rem; color: #aaa; margin-bottom: 30px; }
        .content-text { font-size: 1.1rem; line-height: 1.8; font-weight: 300; margin-bottom: 40px; color: #d0d0d0; }

        .btn-group { display: flex; justify-content: center; gap: 20px; }
        .btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 14px 40px; font-family: 'Cinzel', serif; font-size: 0.9rem;
            cursor: pointer; transition: all 0.4s ease; text-transform: uppercase; letter-spacing: 2px;
        }

        .btn:hover { background: var(--gold); color: var(--royal-black); box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }

        /* The WhatsApp Success Button */
        #whatsappBtn {
            display: none;
            background-color: #25D366;
            color: white;
            border: none;
            margin-top: 20px;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            animation: fadeIn 1s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="main-card">
        <p class="subtitle">A Request for</p>
        <h1 id="headline">Awelewa</h1>
        
        <div class="content-text" id="textBody">
            Every moment since Valentine's has been a dream. 
            I want to make it official and build our future together. 
            <br><br>
            <strong>Will you be my girlfriend?</strong>
        </div>

        <div class="btn-group" id="controls">
            <button class="btn" id="yesBtn">Yes</button>
            <button class="btn" id="noBtn">No</button>
        </div>

        <a href="https://wa.me/2347063628656?text=Yes%20Oladimeji!%20I%20would%20love%20to%20be%20your%20girlfriend!%20❤️" 
           id="whatsappBtn" class="btn">
           Message me on WhatsApp 📱
        </a>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const whatsappBtn = document.getElementById('whatsappBtn');
        const headline = document.getElementById('headline');
        const textBody = document.getElementById('textBody');
        const controls = document.getElementById('controls');

        const FORMSPREE_ID = 'xeerqjog'; 

        yesBtn.addEventListener('click', () => {
            // 1. Silent Notification
            fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: "Awelewa said YES!" })
            });

            // 2. Gold Confetti
            const end = Date.now() + (5 * 1000);
            (function frame() {
              confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#d4af37', '#ffffff'] });
              confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#d4af37', '#ffffff'] });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());

            // 3. Reveal WhatsApp Button
            headline.innerHTML = "Success! ❤️";
            textBody.innerHTML = "I am so happy, Obim. Click below to tell me yourself!";
            controls.style.display = 'none';
            whatsappBtn.style.display = 'inline-block';
        });

        noBtn.addEventListener('click', () => {
            headline.innerHTML = "I Respect You";
            textBody.innerHTML = "My feelings for you remain the same, Awelewa.";
            controls.style.display = 'none';
        });
    </script>
</body>
</html>
