<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Promise to Awelewa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold: #d4af37;
            --deep-burgundy: #4a0404;
            --royal-black: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--royal-black);
            color: white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Cinematic Background */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #630d0d 0%, #1a1a1a 100%);
            z-index: -1;
        }

        .main-card {
            text-align: center;
            padding: 60px 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 5px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            animation: slideUp 2s ease-out;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: var(--gold);
            margin: 0;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        .content-text {
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--gold);
            color: var(--royal-black);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        #noBtn:hover {
            border-color: #777;
            color: #777;
            background: transparent;
            box-shadow: none;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Gold Dust Particles */
        .particles {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="main-card" id="card">
        <p class="subtitle">A Request for my</p>
        <h1 id="headline">Awelewa</h1>
        
        <div class="content-text" id="textBody">
            You are the quiet strength in my days and the gold in my horizon. 
            I want to build a life where you aren't just a part of it, but the heart of it. 
            <br><br>
            <strong>Will you be my girlfriend?</strong>
        </div>

        <div class="btn-container" id="controls">
            <button class="btn" id="yesBtn">Yes</button>
            <button class="btn" id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const headline = document.getElementById('headline');
        const textBody = document.getElementById('textBody');
        const controls = document.getElementById('controls');

        // Elegant Gold Celebration
        yesBtn.addEventListener('click', () => {
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
              const timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              const particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // Update UI to a "Final" State
            headline.innerHTML = "Always Yours";
            textBody.innerHTML = "I am honored to call you mine. Here's to us, Obim. ❤️";
            controls.style.display = 'none';
        });

        // Simple respect for the "No" button
        noBtn.addEventListener('click', () => {
            headline.innerHTML = "I Understand";
            textBody.innerHTML = "My feelings remain the same, Awelewa. I'll always be here for you.";
            controls.style.display = 'none';
        });
    </script>
</body>
</html>
