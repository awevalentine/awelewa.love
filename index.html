<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Awelewa ❤️</title>
    
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/ff4d6d/like.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffafbd;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            padding: 3rem;
            width: 85%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1.5s ease;
            z-index: 10;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .message {
            color: #fff;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Heartbeat Animation */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }

        #yesBtn {
            background-color: var(--primary-pink);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            animation: heartbeat 1.5s infinite ease-in-out;
        }

        #noBtn {
            background-color: white;
            color: var(--primary-pink);
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 2rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="your-song-link-here.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1 id="title">Awelewa,</h1>
        <p class="message" id="mainMessage">
            Every moment since you said yes to being my Valentine has been a dream. 
            Obim, I want us to be official. Will you be my girlfriend?
        </p>
        
        <div class="btn-group">
            <button id="yesBtn">Yes! ❤️</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainMessage = document.getElementById('mainMessage');
        const title = document.getElementById('title');
        const music = document.getElementById('bgMusic');

        // Play music on first interaction (required by browsers)
        document.body.addEventListener('click', () => {
            music.play().catch(() => { /* handle silent block */ });
        }, { once: true });

        // Teleporting "No" Button
        const moveNoButton = () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        };

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents clicking on mobile
            moveNoButton();
        });

        // Celebration Logic
        yesBtn.addEventListener('click', () => {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffffff', '#ffafbd']
            });

            title.innerHTML = "Success! ❤️";
            mainMessage.innerHTML = "I'm the luckiest man alive to have you as my girlfriend, Obim.";
            
            noBtn.style.display = 'none';
            yesBtn.style.animation = 'none'; // Stop heartbeat
            yesBtn.style.transform = 'scale(1.2)';
            yesBtn.innerHTML = "Forever! ✨";
        });
    </script>
</body>
</html>
